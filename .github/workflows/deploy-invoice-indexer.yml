name: Deploy Invoice Indexer

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Infrastructure"]
    types:
      - completed

jobs:
  build-and-deploy:
    runs-on: [self-hosted]
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push Docker image
        run: |
          az acr build \
            --registry crragtest \
            --image invoice-indexer:${{ github.sha }} \
            --image invoice-indexer:latest \
            --file src/InvoiceIndexer/Dockerfile \
            src/InvoiceIndexer

      - name: Start indexer
        run: |
          az container start \
            --resource-group rg-support-agent-dev \
            --name aci-invoice-indexer-dev
