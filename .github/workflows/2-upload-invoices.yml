name: 2 - Upload Invoices

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: [self-hosted]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to Azure Blob
        run: |
          find ./invoices -name "*.pdf" | head -500 | while read file; do
            az storage blob upload \
              --account-name stinvdocstest \
              --container-name documents \
              --file "$file" \
              --name "${file#./invoices/}" \
              --overwrite true \
              --auth-mode login
          done