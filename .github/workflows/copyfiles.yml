name: Upload Invoices to Azure Blob

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload to Azure Blob
        run: |
          find ./invoices -name "*.pdf" | head -500 | while read file; do
            az storage blob upload \
              --account-name stinvdocsdev \
              --container-name documents \
              --file "$file" \
              --name "${file#./invoices/}" \
              --overwrite true \
              --auth-mode key
          done
