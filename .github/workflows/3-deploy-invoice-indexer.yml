name: 3 - Deploy Invoice Indexer

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push Docker image
        run: |
          az acr build \
            --registry crragtest \
            --image invoice-indexer:${{ github.sha }} \
            --image invoice-indexer:latest \
            --file src/InvoiceIndexer/Dockerfile \
            src/InvoiceIndexer

      - uses: hashicorp/setup-terraform@v2

      - name: Terraform init
        working-directory: ./infra
        env:
          ARM_USE_MSI: true
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform init

      - name: Terraform apply with image tag
        working-directory: ./infra
        env:
          ARM_USE_MSI: true
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_admin_object_id: ${{ secrets.ADMIN_OBJECT_ID }}
        run: |
          terraform apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="indexer_image_tag=${{ github.sha }}"
